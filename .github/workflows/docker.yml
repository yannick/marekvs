# Build and push the marekvs images to ghcr.io.
#
# Two images from the same build stage (identical binary):
#   ghcr.io/<owner>/marekvs:latest|sha-<sha>|vX.Y.Z      (Dockerfile, FROM scratch)
#   ghcr.io/<owner>/marekvs:debug|debug-sha-<sha>|...    (Dockerfile.debug, alpine
#                                                         + iptables/tc — chaos only)
#
# Multi-arch WITHOUT QEMU: the Rust musl build takes far too long emulated,
# so each platform builds on a native runner (ubuntu-24.04 / ubuntu-24.04-arm,
# free for public repos), pushes by digest, and a merge job stitches the
# manifest lists.
#
# Build context: the Dockerfiles COPY both `marekvs/` and `ondadb/` (path
# dependency), so the job checks out BOTH repos side by side and writes the
# same cargo [patch] the Justfile's _stage-ctx generates locally.

name: docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ondadb-ref:
        description: ondadb ref to build against
        default: main

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout marekvs
        uses: actions/checkout@v4
        with:
          path: marekvs

      - name: checkout ondadb (path dependency)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ondadb
          ref: ${{ inputs.ondadb-ref || 'main' }}
          path: ondadb

      - name: point cargo at the checked-out ondadb
        run: |
          mkdir -p marekvs/.cargo
          printf '[patch."https://github.com/%s/ondadb.git"]\nondadb = { path = "../ondadb" }\n' \
            "${{ github.repository_owner }}" > marekvs/.cargo/config.toml

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: sanitize platform for artifact names
        run: echo "PLATFORM_PAIR=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_ENV"

      - name: build+push production image (by digest)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: marekvs/Dockerfile
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=build-${{ env.PLATFORM_PAIR }},mode=max

      - name: build+push debug image (by digest)
        id: build-debug
        uses: docker/build-push-action@v6
        with:
          context: .
          file: marekvs/Dockerfile.debug
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # same scope: the build stage is byte-identical to the production
          # image's, so the second build is a cache hit + alpine layer
          cache-from: type=gha,scope=build-${{ env.PLATFORM_PAIR }}

      - name: export digests
        run: |
          mkdir -p /tmp/digests/prod /tmp/digests/debug
          touch "/tmp/digests/prod/$(echo '${{ steps.build.outputs.digest }}' | cut -d: -f2)"
          touch "/tmp/digests/debug/$(echo '${{ steps.build-debug.outputs.digest }}' | cut -d: -f2)"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: production tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}
            # Flux image-automation tag: <branch>-<sha7>-<unix ts>, sortable
            # by the trailing timestamp (same convention as console-mono).
            type=raw,value={{branch}}-{{sha}}-{{date 'X'}},enable={{is_default_branch}}

      - name: debug tags
        id: meta-debug
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=debug,enable={{is_default_branch}}
            type=sha,prefix=debug-sha-
            type=semver,pattern={{version}},prefix=debug-
            type=raw,value=debug-{{branch}}-{{sha}}-{{date 'X'}},enable={{is_default_branch}}

      - name: create production manifest list
        working-directory: /tmp/digests/prod
        run: |
          # shellcheck disable=SC2046  # word splitting is the point here
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta.outputs.json }}') \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: create debug manifest list
        working-directory: /tmp/digests/debug
        run: |
          # shellcheck disable=SC2046  # word splitting is the point here
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< '${{ steps.meta-debug.outputs.json }}') \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: inspect
        run: |
          docker buildx imagetools inspect "${{ env.IMAGE }}:$(jq -r '.tags[0]' <<< '${{ steps.meta.outputs.json }}' | cut -d: -f2)"
