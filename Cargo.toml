[workspace]
resolver = "2"
members = [
    "crates/marekvs-core",
    "crates/marekvs-resp",
    "crates/marekvs-proto",
    "crates/marekvs-engine",
    "crates/marekvs-cluster",
    "crates/marekvs-repl",
    "crates/marekvs-server",
    "crates/marekvs-operator",
]

[workspace.package]
version = "0.2.0"
edition = "2021"
rust-version = "1.85"
# Proprietary — all rights reserved. Not open-source licensed; no `license` field.

[workspace.dependencies]
# Canonical source; a sibling checkout at ../ondadb overrides it via the
# [patch] in .cargo/config.toml (auto-generated by `just` — see _cargo-config).
ondadb = { git = "https://github.com/yannick/ondadb.git" }
tokio = { version = "1", features = ["full"] }
bytes = "1"
postcard = { version = "1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
xxhash-rust = { version = "0.8", features = ["xxh3"] }
crossbeam-channel = "0.5"
parking_lot = "0.12"
smallvec = { version = "1", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "registry"] }
chitchat = "0.9"
anyhow = "1"
thiserror = "2"
proptest = "1"
prometheus = { version = "0.14", default-features = false }
mlua = { version = "0.10", features = ["lua54", "vendored", "serialize"] }
sha1_smol = "1"
serde_json = "1"
# Protobuf stack (design/17): protox pins the prost/prost-reflect pairing.
prost = "0.14"
prost-types = "0.14"
prost-reflect = { version = "0.16", features = ["serde"] }
protox = "0.9"

marekvs-core = { path = "crates/marekvs-core" }
marekvs-resp = { path = "crates/marekvs-resp" }
marekvs-proto = { path = "crates/marekvs-proto" }
marekvs-engine = { path = "crates/marekvs-engine" }
marekvs-cluster = { path = "crates/marekvs-cluster" }
marekvs-repl = { path = "crates/marekvs-repl" }

[profile.release]
lto = "thin"
codegen-units = 1
panic = "abort"
strip = "symbols"

[profile.release.package."*"]
opt-level = 3
