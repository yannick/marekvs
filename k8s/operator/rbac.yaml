apiVersion: v1
kind: ServiceAccount
metadata:
  name: marekvs-operator
  labels:
    app: marekvs-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: marekvs-operator
rules:
  # the API the operator serves
  - apiGroups: ["marekvs.io"]
    resources: ["marekvsclusters", "marekvsclusters/status"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # children it materializes
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "patch"]
  # observation (metrics scrape needs pod IPs) + PVC reclaim
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: marekvs-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: marekvs-operator
subjects:
  - kind: ServiceAccount
    name: marekvs-operator
    namespace: default # adjust when deploying to another namespace
